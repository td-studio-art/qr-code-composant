<html lang="en">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">


  <!-- Font family Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <div class="card-one">
